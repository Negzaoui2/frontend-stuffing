<!-- ===== TOPBAR ===== -->
<header class="topbar">
  <div class="topbar-breadcrumb">
    <span>Stuffing</span>
    <span class="sep">/</span>
    <span class="current">Analytics</span>
  </div>
  <div class="topbar-spacer"></div>
</header>

<main class="content">

  <div class="page-header">
    <h1>Analytics RH</h1>
    <p class="page-subtitle">Tableaux de bord analytiques (Qlik Sense)</p>
  </div>

  <!-- Loading State -->
  <div class="loading-overlay" *ngIf="isLoading">
    <div class="spinner"></div>
  </div>

  <!-- Qlik Sense iframe Container -->
  <div class="qlik-container" *ngIf="!isLoading">
    <iframe
      *ngIf="qlikAppUrl"
      [src]="qlikAppUrl"
      class="qlik-iframe"
      title="Qlik Sense Analytics"
      allowfullscreen
    ></iframe>
  </div>

</main>
