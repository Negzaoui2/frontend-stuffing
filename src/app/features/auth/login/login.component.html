<div class="login-container">
  <div class="login-card card-sopra">
    <!-- Logo et titre -->
    <div class="login-header">
      <div class="logo-container">
        <svg width="50" height="50" viewBox="0 0 50 50" fill="none">
          <rect width="50" height="50" rx="10" fill="url(#gradient)"/>
          <path d="M15 25L22 32L35 18" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="gradient" x1="0" y1="0" x2="50" y2="50">
              <stop offset="0%" stop-color="#5B2C91"/>
              <stop offset="100%" stop-color="#3D1A5C"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1>Stuffing Intelligent</h1>
      <p class="subtitle">Connectez-vous à votre compte</p>
      <div class="accent-bar"></div>
    </div>

    <!-- Formulaire -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <!-- Email -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          class="input-sopra"
          placeholder="votre.email@gmail.com"
          [class.input-error]="email?.invalid && email?.touched"
        />
        <div class="error-message" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">L'email est obligatoire</span>
          <span *ngIf="email?.errors?.['email']">Email invalide</span>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          class="input-sopra"
          placeholder="••••••••"
          [class.input-error]="password?.invalid && password?.touched"
        />
        <div class="error-message" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required']">Le mot de passe est obligatoire</span>
          <span *ngIf="password?.errors?.['minlength']">Minimum 6 caractères</span>
        </div>
      </div>

      <!-- Message d'erreur global -->
      <div class="alert-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- Mot de passe oublié -->
      <div class="forgot-password">
        <a routerLink="/auth/reset-password">Mot de passe oublié ?</a>
      </div>

      <!-- Bouton Submit -->
      <button
        type="submit"
        class="btn-sopra-primary btn-full"
        [disabled]="isLoading"
      >
        <span *ngIf="!isLoading">Se connecter</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>

    <!-- Lien inscription -->
    <div class="signup-link">
      Pas encore de compte ?
      <a routerLink="/auth/register">Demander un accès</a>
    </div>
  </div>
</div>
