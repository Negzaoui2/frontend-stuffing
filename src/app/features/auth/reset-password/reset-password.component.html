<div class="reset-container">
  <div class="reset-card card-sopra">
    <div class="reset-header">
      <h1>Mot de passe oublié</h1>
      <p class="subtitle">Entrez votre email pour recevoir un lien</p>
      <div class="accent-bar"></div>
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          class="input-sopra"
          placeholder="votre.email@soprahr.com"
          [class.input-error]="email?.invalid && email?.touched"
        />
        <div class="error-message" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">L'email est obligatoire</span>
          <span *ngIf="email?.errors?.['email']">Email invalide</span>
        </div>
      </div>

      <div class="alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>
      <div class="alert-success" *ngIf="successMessage">{{ successMessage }}</div>

      <button type="submit" class="btn-sopra-primary btn-full" [disabled]="isLoading">
        <span *ngIf="!isLoading">Envoyer</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>

    <div class="back-link">
      <a routerLink="/auth/login">Retour au login</a>
    </div>
  </div>
</div>
