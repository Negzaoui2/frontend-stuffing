<div class="confirm-container">
  <div class="confirm-card card-sopra">
    <div class="confirm-header">
      <h1>Réinitialiser le mot de passe</h1>
      <p class="subtitle">Saisissez votre token et un nouveau mot de passe</p>
      <div class="accent-bar"></div>
    </div>

    <form [formGroup]="confirmForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="token">Token</label>
        <input
          id="token"
          type="text"
          formControlName="token"
          class="input-sopra"
          placeholder="Token reçu par email"
          [class.input-error]="token?.invalid && token?.touched"
        />
        <div class="error-message" *ngIf="token?.invalid && token?.touched">
          <span *ngIf="token?.errors?.['required']">Le token est obligatoire</span>
        </div>
      </div>

      <div class="form-group">
        <label for="newPassword">Nouveau mot de passe</label>
        <input
          id="newPassword"
          type="password"
          formControlName="newPassword"
          class="input-sopra"
          placeholder="••••••••"
          [class.input-error]="newPassword?.invalid && newPassword?.touched"
        />
        <div class="error-message" *ngIf="newPassword?.invalid && newPassword?.touched">
          <span *ngIf="newPassword?.errors?.['required']">Le mot de passe est obligatoire</span>
          <span *ngIf="newPassword?.errors?.['minlength']">Minimum 6 caractères</span>
        </div>
      </div>

      <div class="alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>
      <div class="alert-success" *ngIf="successMessage">{{ successMessage }}</div>

      <button type="submit" class="btn-sopra-primary btn-full" [disabled]="isLoading">
        <span *ngIf="!isLoading">Confirmer</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>

    <div class="back-link">
      <a routerLink="/auth/login">Retour au login</a>
    </div>
  </div>
</div>
