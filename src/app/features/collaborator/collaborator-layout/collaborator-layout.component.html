<div class="collab-shell">

  <!-- ===== SIDEBAR ===== -->
  <aside class="collab-sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <div class="brand-icon">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </div>
        <div>
          <span class="brand-name">Stuffing</span>
          <span class="brand-sub">Espace Collaborateur</span>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <p class="sidebar-label">Navigation</p>
      <ul class="sidebar-nav">
        <li class="nav-item" routerLink="/collaborator/dashboard" routerLinkActive="active">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          <span>Tableau de bord</span>
        </li>
        <li class="nav-item" routerLink="/collaborator/assignments" routerLinkActive="active">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
          </svg>
          <span>Mes Affectations</span>
        </li>
        <li class="nav-item" routerLink="/collaborator/calendar" routerLinkActive="active">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span>Planning</span>
        </li>
        <li class="nav-item" routerLink="/collaborator/leaves" routerLinkActive="active">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          <span>Mes Congés</span>
        </li>
        <li class="nav-item" routerLink="/collaborator/profile" routerLinkActive="active">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span>Mon Profil</span>
        </li>
      </ul>

      <p class="sidebar-label">Outils</p>
      <ul class="sidebar-nav">
      </ul>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-ava">{{ userInitials }}</div>
        <div class="user-details">
          <div class="user-name">{{ displayName }}</div>
          <div class="user-role">Collaborateur</div>
        </div>
        <button class="btn-logout" (click)="logout()" title="Déconnexion">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ===== MAIN OUTLET ===== -->
  <div class="collab-main">
    <router-outlet></router-outlet>
  </div>

  <!-- Chatbot Bubble -->
  <app-chatbot-bubble></app-chatbot-bubble>

</div>
