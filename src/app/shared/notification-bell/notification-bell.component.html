<div class="notif-bell-wrapper">
  <!-- Bouton cloche -->
  <button class="bell-btn" (click)="togglePanel()" title="Notifications">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
    </svg>
    <span class="badge-count" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
  </button>

  <!-- Panneau déroulant -->
  <div class="notif-panel" *ngIf="isOpen">
    <div class="notif-panel-header">
      <h3>Notifications</h3>
      <button class="mark-all-btn" *ngIf="unreadCount > 0" (click)="markAllAsRead()">
        Tout marquer comme lu
      </button>
    </div>

    <div class="notif-panel-body">

      <!-- LOADING -->
      <div class="notif-loading" *ngIf="isLoading">
        <div class="spinner-small"></div>
      </div>

      <!-- ERREUR -->
      <div class="notif-empty" *ngIf="!isLoading && errorMessage">
        <p style="color:#ef4444">{{ errorMessage }}</p>
      </div>

      <!-- LISTE -->
      <div class="notif-list" *ngIf="!isLoading && !errorMessage && notifications.length > 0">
        <div
          class="notif-item"
          *ngFor="let notif of notifications"
          [class.unread]="!notif.isRead"
          (click)="markAsRead(notif)"
        >
          <div class="notif-icon">{{ getIcon(notif.type) }}</div>
          <div class="notif-content">
            <p class="notif-message">{{ notif.message }}</p>
            <span class="notif-time">{{ getTimeAgo(notif.createdAt) }}</span>
          </div>
          <div class="notif-unread-dot" *ngIf="!notif.isRead"></div>
        </div>
      </div>

      <!-- VIDE -->
      <div class="notif-empty" *ngIf="!isLoading && !errorMessage && notifications.length === 0">
        <p>Aucune notification</p>
      </div>

    </div>
  </div>
</div>
